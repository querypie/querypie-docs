name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      fetch_arguments:
        description: 'Arguments for fetch_cli.py'
        required: false
        type: choice
        options:
          - '--recent --attachments'
          - '--remote --attachments'
        default: '--recent --attachments'
  push:
    branches:
      - main
    paths:
      - 'confluence-mdx/**'
  pull_request:
    branches:
      - main
    paths:
      - 'confluence-mdx/**'

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup cache directory
        working-directory: ./confluence-mdx
        run: |
          set -o errexit -o nounset -o pipefail -o xtrace
          ./bin/setup-cache.sh docker

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_CREDENTIAL }}

      - name: Build Docker image
        working-directory: ./confluence-mdx
        run: |
          set -o errexit -o nounset -o pipefail -o xtrace
          docker compose --progress=plain build

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        working-directory: ./confluence-mdx
        run: |
          set -o errexit -o nounset -o pipefail -o xtrace
          touch .env
          docker compose --progress=plain push

      - name: Run fetch_cli.py
        if: github.event_name == 'workflow_dispatch'
        working-directory: ./confluence-mdx
        env:
          ATLASSIAN_TOKEN: ${{ secrets.ATLASSIAN_TOKEN }}
        run: |
          set -o errexit -o nounset -o pipefail -o xtrace
          docker compose run --rm -e ATLASSIAN_TOKEN confluence-mdx fetch ${{ inputs.fetch_arguments }}

      - name: Clean up untagged images from Docker Hub
        if: github.event_name != 'pull_request'
        continue-on-error: true
        working-directory: ./confluence-mdx
        env:
          DOCKERHUB_USERNAME: ${{ vars.CONTAINER_REGISTRY_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_CREDENTIAL }}
        run: python3 bin/dockerhub-cleanup.py

