name: Generate MDX from Confluence

on:
  workflow_dispatch:
    inputs:
      use_local:
        description: 'Use local files (--local option)'
        required: false
        default: false
        type: boolean
      use_attachments:
        description: 'Download attachments from Confluence pages (--attachments option)'
        required: false
        default: false
        type: boolean

jobs:
  generate-mdx:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 가져오기 (git status를 위해 필요)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Workflow Options
        run: |
          echo "Use local files (--local): ${{ inputs.use_local }}"
          echo "Download attachments (--attachments): ${{ inputs.use_attachments }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull latest Docker image
        working-directory: ./confluence-mdx
        run: |
          set -o xtrace
          docker --version
          docker compose version
          # 플랫폼을 명시적으로 지정하여 아키텍처 불일치 오류 방지
          DOCKER_DEFAULT_PLATFORM=linux/amd64 docker compose --progress=quiet pull confluence-mdx

      - name: Generate MDX files
        working-directory: ./confluence-mdx
        run: |
          # 옵션 구성
          OPTIONS=""
          if [[ "${{ inputs.use_local }}" == "true" ]]; then
            OPTIONS="$OPTIONS --local"
          fi
          if [[ "${{ inputs.use_attachments }}" == "true" ]]; then
            OPTIONS="$OPTIONS --attachments"
          fi
          set -o xtrace
          touch .env # Create an empty .env to prevent missing .env error.
          docker compose run --rm confluence-mdx full $OPTIONS

      - name: Check for changes
        run: |
          echo "=== Git Status ==="
          git status

      - name: Create Pull Request for src/content changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh CLI 인증 설정
          echo "$GITHUB_TOKEN" | gh auth login --with-token
          
          # src/content/ 변경사항 확인
          # git status --porcelain 출력 형식: " M file" (unstaged), "M  file" (staged), "MM file" (both)
          if ! git status --porcelain src/content/ | grep -q "[AM]"; then
            echo "No changes in src/content/ directory"
            exit 0
          fi
          
          # 변경사항 통계를 커밋 전에 저장
          CHANGES_STATUS=$(git status --short src/content/ || echo "")
          CHANGES_STAT=$(git diff --stat HEAD src/content/ || echo "")
          
          if [[ -z "$CHANGES_STATUS" ]]; then
            echo "No changes in src/content/ directory"
            exit 0
          fi
          
          # 브랜치 이름 생성 (타임스탬프 기반)
          BRANCH_NAME="mdx/confluence-updates-$(date +%Y%m%d-%H%M%S)"
          
          # 브랜치 생성 및 체크아웃
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@querypie.com"
          git checkout -b "$BRANCH_NAME"
          
          # src/content/ 변경사항만 스테이징
          git add src/content/
          
          # 변경사항이 있는지 확인
          if [[ -z "$(git diff --cached --name-only)" ]]; then
            echo "No staged changes in src/content/"
            exit 0
          fi
          
          # 커밋
          git commit -m "mdx: Updates from Confluence"
          
          # 브랜치 푸시 (PR 생성 전에 필요)
          git push -u origin "$BRANCH_NAME"
          
          # PR Description 생성 (요청하신 형식에 맞춤)
          # heredoc 대신 printf를 사용하여 YAML 파서 오류 방지
          PR_BODY=$(printf '%s\n\n%s\n\n%s\n\n%s\n' \
            "=== Changes in target-related directories ===" \
            "$CHANGES_STATUS" \
            "=== Change Statistics ===" \
            "$CHANGES_STAT")
          
          # PR 생성
          gh pr create \
            --title "mdx: Updates from Confluence" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH_NAME"

