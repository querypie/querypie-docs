  xhtml_plain_text: 1) KUBECONFIG 환경 변수를 최초 설정하는 경우, 명령 줄 내의 디폴트 "${KUBECONFIG}" 값을
    사용 전에 "${HOME}/.kube/config"로 변경해야 합니다.
  xhtml_text: 1) KUBECONFIG 환경 변수를 최초 설정하는 경우, 명령 줄 내의 디폴트 "<code>${KUBECONFIG}</code>"
    값을 사용 전에 "<code>${HOME}/.kube/config</code>"로 변경해야 합니다.
