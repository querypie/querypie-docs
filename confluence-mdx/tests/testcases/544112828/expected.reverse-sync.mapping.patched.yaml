  xhtml_plain_text: 'Where : 우측의 🔽 버튼을 클릭하여 원하는 폴더를 지정합니다.Save As : Kubeconfig 파일의
    이름을 입력합니다. 변경하지 않으면 기본값으로 적용됩니다.Command Line : KUBECONFIG 환경 변수를 선언하기 위한 커맨드 라인을
    제공합니다.'
  xhtml_text: '<ul><li><p><strong>Where</strong> : 우측의 <code>🔽</code> 버튼을 클릭하여 원하는
    폴더를 지정합니다.</p></li><li><p><strong>Save As</strong> : Kubeconfig 파일의 이름을 입력합니다.
    변경하지 않으면 기본값으로 적용됩니다.</p></li><li><p><strong>Command Line</strong> : KUBECONFIG
    환경 변수를 선언하기 위한 커맨드 라인을 제공합니다.</p></li></ul>'
  xhtml_xpath: ul[6]
