# reverse-sync E2E 테스트케이스 매니페스트 + 페이지 카탈로그
#
# 이 파일은 두 가지 역할을 합니다:
#   1. forward converter가 로드하는 페이지 카탈로그 (list 형식)
#      → cross-page 링크 해소, frontmatter/h1 자동 생성에 사용됨
#      → 테스트케이스 페이지 + 테스트케이스에서 링크되는 대상 페이지만 포함
#   2. reverse-sync 테스트케이스 메타데이터 (failure_type, severity 등)
#      → failure_type 필드가 있는 항목이 테스트케이스
#
# 출처별 브랜치:
#   fix/proofread-mdx (2026-02-18, 17건)
#   split/ko-proofread-20260221-administrator-manual-general (2026-03-10, 17건 신규)
#   split/ko-proofread-20260221-administrator-manual-kubernetes (2026-03-10, 4건 신규)
#
