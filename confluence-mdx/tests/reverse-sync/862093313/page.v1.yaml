title: 시스템 아키텍처와 네트워크 접근제어
body:
  view:
    value: |-
      <p>QueryPie User Agent 는 User PC 에서 작동하는 대부분의 Database Client Application, SSH Client Application 을 지원합니다. (이후 <code>3rd Party Tool</code> 이라고 표기합니다.) 구체적인 사례는 이 문서를 참조하세요: <a href="https://querypie.atlassian.net/wiki/spaces/QCP/pages/919404587" data-linked-resource-id="919404587" data-linked-resource-type="page">Supported 3rd Party Tools (KO)</a></p>
